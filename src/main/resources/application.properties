spring.application.name=user-service
server.port=8080

# Database (defaults to H2 locally, overridden by env vars on EC2)
spring.datasource.url=${DB_URL:jdbc:h2:mem:userdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (local only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${JWT_SECRET:ecommerce-user-service-secret-key-2024-very-long-secret}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html